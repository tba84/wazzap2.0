<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wazzap</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="landing-body">
  <!-- Landing page that links to the browser client and the server dashboard. -->
  <div class="landing-shell">
    <div class="hero-card">
      <div class="hero-copy">
        <span class="eyebrow">Encrypted local chat</span>
        <h1>Wazzap</h1>
        <p>
          Fast, clean, and familiar browser messaging for your socket project — with polished sign in,
          private conversations, live delivery flow, and a sleek localhost experience.
        </p>
        <div class="hero-actions">
          <a class="primary-btn" href="/client">Open Client</a>
          <a class="ghost-btn" href="/server">Open Server Dashboard</a>
        </div>
      </div>
      <div class="hero-preview">
        <div class="preview-window">
          <div class="preview-topbar">
            <span></span><span></span><span></span>
          </div>
          <div class="preview-body">
            <div class="preview-sidebar">
              <div class="preview-avatar"></div>
              <div class="preview-line wide"></div>
              <div class="preview-line"></div>
              <div class="preview-line"></div>
            </div>
            <div class="preview-chat">
              <div class="preview-bubble incoming"></div>
              <div class="preview-bubble outgoing"></div>
              <div class="preview-bubble incoming short"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
