<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-body">
  <!-- Dashboard used to start/stop the socket backend and inspect live status. -->
  <div class="dashboard-shell">
    <div class="page-header compact">
      <div>
        <span class="eyebrow">Admin</span>
        <h1>Server dashboard</h1>
      </div>
      <a class="ghost-btn" href="/client">Open client</a>
    </div>

    <div class="toolbar card">
      <label class="field small-field">
        <span>Socket server port</span>
        <input id="port" type="number" value="0" placeholder="0 for auto">
      </label>
      <div class="toolbar-actions">
        <button class="primary-btn" id="startBtn">Start server</button>
        <button class="danger-btn" id="shutdownBtn">Shutdown</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Running</span>
        <strong id="runningStat">No</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Backend host</span>
        <strong id="hostStat">-</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Backend port</span>
        <strong id="portStat">-</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Queued messages</span>
        <strong id="queueStat">0</strong>
      </div>
    </div>

    <div class="dashboard-grid">
      <section class="card panel">
        <div class="panel-head"><h2>Users</h2></div>
        <div id="usersPanel" class="stack-list empty-copy">No users yet.</div>
      </section>
      <section class="card panel">
        <div class="panel-head"><h2>Mailboxes</h2></div>
        <div id="mailboxesPanel" class="stack-list empty-copy">No mailbox data yet.</div>
      </section>
      <section class="card panel full-span">
        <div class="panel-head"><h2>Logs</h2></div>
        <pre id="logsPanel" class="logbox"></pre>
      </section>
    </div>
  </div>
<script>
// ------------------------------
// Server dashboard logic
// ------------------------------
//
// This page never talks to backend.py directly. It talks to app.py over HTTP, and app.py
// starts/stops the backend and returns status snapshots for display here.
// Convenience wrapper for sending JSON POST requests.
async function post(url, body={}){
  const res = await fetch(url,{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  return res.json();
}
function badge(text, cls=''){ return `<span class="badge ${cls}">${text}</span>`; }
// Render the list of known users and whether they are online.
function renderUsers(users){
  const root = document.getElementById('usersPanel');
  const names = Object.keys(users || {});
  if(!names.length){ root.innerHTML = 'No users yet.'; return; }
  root.innerHTML = names.sort().map(name=>{
    const item = users[name];
    return `<div class="row-item"><div><strong>${name}</strong></div><div>${item.online ? badge('Online','success') : badge('Offline')} ${item.has_socket ? badge('Socket') : ''}</div></div>`;
  }).join('');
}
// Render mailbox statistics so pending delivery can be inspected quickly.
function renderMailboxes(mailboxes){
  const root = document.getElementById('mailboxesPanel');
  const names = Object.keys(mailboxes || {});
  if(!names.length){ root.innerHTML = 'No mailbox data yet.'; return; }
  root.innerHTML = names.sort().map(name=>{
    const item = mailboxes[name];
    return `<div class="row-item"><div><strong>${name}</strong></div><div class="mini-stats"><span>Total ${item.total}</span><span>Delivered ${item.delivered}</span><span>Pending ${item.undelivered}</span></div></div>`;
  }).join('');
}
// Fetch one new backend snapshot and repaint the dashboard.
async function refresh(){
  const res = await fetch('/api/server/state');
  const data = await res.json();
  document.getElementById('runningStat').textContent = data.running ? 'Yes' : 'No';
  document.getElementById('hostStat').textContent = data.host || '-';
  document.getElementById('portStat').textContent = data.port || '-';
  document.getElementById('queueStat').textContent = data.queued_messages;
  renderUsers(data.users || {});
  renderMailboxes(data.mailboxes || {});
  document.getElementById('logsPanel').textContent = (data.logs || []).join('\n');
}
document.getElementById('startBtn').onclick = async ()=>{
  const port = Number(document.getElementById('port').value || 0);
  await post('/api/server/start', {port});
  refresh();
};
document.getElementById('shutdownBtn').onclick = async ()=>{
  await post('/api/server/shutdown', {});
  refresh();
};
setInterval(refresh, 1000);
refresh();
</script>
</body>
</html>
